name: dice
description: "Dice Target"
publish_to: 'none'
version: 1.4.0+10

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  cupertino_icons: ^1.0.8
  # Audio SFX
  audioplayers: ^6.5.1
  # Persistent settings
  shared_preferences: ^2.2.3
  # VS Mode
  cloud_firestore: ^5.0.0
  uuid: ^4.5.2
  # Confetti animation
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
    - assets/branding/
    - assets/icon/

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path_ios: "assets/ios_app_icon.png"
  image_path_android: "assets/icon/android_foreground.png"
  adaptive_icon_background: "#0A0F1F"
  adaptive_icon_foreground: "assets/icon/android_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0F1F"
  image: assets/DiceTarget_AppIcon_1024_universal.png
  ios: false
  android: true
  android_gravity: center
  android_12:
    color: "#0A0F1F"
    image: assets/icon/android_splash_icon.png
    icon_background_color: "#0A0F1F"