name: dice
description: "Dice Target"
publish_to: 'none'
version: 1.1.1+6

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Audio SFX
  audioplayers: ^6.5.1

  # Persistent settings
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/sfx/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/DiceTarget_AppIcon_1024_universal.png"
  adaptive_icon_background: "#0F1118"
  adaptive_icon_foreground: "assets/DiceTarget_AppIcon_1024_universal.png"